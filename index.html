<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionel Messi | The GOAT Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --accent: #e74c3c;
            --accent-glow: rgba(231, 76, 60, 0.3);
            --border: rgba(255,255,255,0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #c0392b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 1.3rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text span {
            color: var(--accent);
            font-weight: 900;
        }

        .search-wrapper {
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .search-input {
            padding: 12px 20px 12px 45px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 0.95rem;
            width: 280px;
            transition: var(--transition);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            width: 320px;
        }

        .hero {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: radial-gradient(circle at 50% 0%, rgba(231,76,60,0.15), transparent);
            padding-top: 80px;
        }
        .hero-content {
            animation: fadeUp 0.8s ease;
        }
        .hero-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(231,76,60,0.2);
            border: 1px solid rgba(231,76,60,0.5);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .hero-badge i {
            color: var(--accent);
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }
        .hero h1 span {
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .hero-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 1rem;
        }

        .filters-section {
            padding: 2rem 0;
            position: sticky;
            top: 70px;
            background: var(--bg-dark);
            z-index: 99;
        }
        .filter-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 10px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-chip i {
            font-size: 0.9rem;
        }
        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        .filter-chip.active {
            background: linear-gradient(135deg, var(--accent), #c0392b);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 2rem;
            margin: 2rem auto;
            background: rgba(255,255,255,0.02);
            border-radius: 60px;
            border: 1px solid var(--border);
            max-width: 500px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .gallery {
            padding: 2rem 0 5rem;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .gallery-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .gallery-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
        }
        .card-image {
            position: relative;
            height: 350px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .gallery-card:hover .card-image img {
            transform: scale(1.08);
        }
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: var(--transition);
        }
        .gallery-card:hover .card-overlay {
            opacity: 1;
        }
        .card-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            transform: translateY(20px);
            transition: var(--transition);
        }
        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            transform: translateY(20px);
            transition: var(--transition);
            transition-delay: 0.05s;
        }
        .gallery-card:hover .card-title,
        .gallery-card:hover .card-desc {
            transform: translateY(0);
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 85vh;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .lightbox-info {
            position: absolute;
            bottom: -80px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
        }
        .lightbox-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }
        .lightbox-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            transition: var(--transition);
        }
        .lightbox-nav:hover {
            background: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }
        .prev-nav { left: 20px; }
        .next-nav { right: 20px; }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            transition: var(--transition);
        }
        .close-lightbox:hover {
            background: var(--accent);
            transform: rotate(90deg);
        }

        .loading, .no-results {
            text-align: center;
            padding: 4rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        .no-results i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            display: none;
            z-index: 99;
            transition: var(--transition);
        }
        .scroll-top.show {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        .scroll-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container { padding: 0 1.2rem; }
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; }
            .search-input { width: 100%; }
            .search-input:focus { width: 100%; }
            .filter-chip { padding: 6px 16px; font-size: 0.85rem; }
            .stats { gap: 1.5rem; }
            .stat-number { font-size: 1.5rem; }
            .gallery-grid { grid-template-columns: 1fr; }
            .lightbox-nav { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-futbol"></i></div>
                <span class="logo-text">MESSI <span>10</span></span>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search moments...">
            </div>
        </div>
    </div>
</header>

<section class="hero">
    <div class="container">
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-trophy"></i> GOAT · 8x Ballon d'Or
            </div>
            <h1>Lionel <span>Messi</span></h1>
            <p>The Greatest Footballer of All Time | Legendary Moments Captured</p>
            <div class="hero-number">🔟</div>
        </div>
    </div>
</section>

<div class="container">
    <div class="filters-section">
        <div class="filter-group" id="filterGroup">
            <button class="filter-chip active" data-filter="all"><i class="fas fa-th-large"></i> All</button>
            <button class="filter-chip" data-filter="barcelona"><i class="fas fa-futbol"></i> Barcelona</button>
            <button class="filter-chip" data-filter="argentina"><i class="fas fa-flag-checkered"></i> Argentina</button>
            <button class="filter-chip" data-filter="trophies"><i class="fas fa-trophy"></i> Trophies</button>
            <button class="filter-chip" data-filter="iconic"><i class="fas fa-star"></i> Iconic</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total Moments</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="displayCount">0</div>
            <div class="stat-label">Showing</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">🔟</div>
            <div class="stat-label">Legend</div>
        </div>
    </div>

    <div class="gallery">
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading legendary moments...</p>
        </div>
        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>No Moments Found</h3>
            <p>Try searching for different keywords</p>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <button class="close-lightbox" id="closeLightbox"><i class="fas fa-times"></i></button>
    <button class="lightbox-nav prev-nav" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
    <button class="lightbox-nav next-nav" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    <div class="lightbox-content">
        <img id="lightboxImg" alt="">
        <div class="lightbox-info">
            <h3 id="lbTitle"></h3>
            <p id="lbDesc"></p>
        </div>
    </div>
</div>

<button class="scroll-top" id="scrollTopBtn"><i class="fas fa-arrow-up"></i></button>

<script src="script.js"></script>
</body>
</html>
